services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev-only-not-a-secret}@db:5432/ticketing
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      # 127.0.0.1, not localhost: alpine resolves localhost to ::1 first and
      # the server binds IPv4 0.0.0.0 only.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ticketing
      # Dev-only default (declared bounded exception, architecture.md §2):
      # not a user credential, guards nothing outside the compose network.
      # Override via POSTGRES_PASSWORD in a local .env (see .env.example).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-not-a-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketing"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      # Web UI for reading verification mail in dev/QA.
      - "8025:8025"

volumes:
  pgdata:
